# SonarQube Cloud — analysis configuration
# (projectKey / organization are auto-detected from the GitHub binding under
#  Automatic Analysis, so they don't need to be set here.)

# --- Duplication exclusions -------------------------------------------------
# The i18n dictionaries are parallel-by-design: the same keys appear in every
# language with different values, so a copy-paste detector flags them as ~96%
# "duplicated". That is inherent to translation files, not real duplication —
# merging them would break localisation. Exclude them from duplication metrics.
sonar.cpd.exclusions=**/lib/translations/**,**/lib/portal-i18n.ts

# --- Analysis exclusions ----------------------------------------------------
# Auto-generated Prisma client — not authored code, should not be analysed.
sonar.exclusions=src/generated/**
